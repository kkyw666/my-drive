<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>可可鹦鹉的云盘</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070c;--s1:#0e0e16;--s2:#161620;--s3:#1e1e2e;
  --bd:#262640;--t1:#eaeaf4;--t2:#7a7a9e;--t3:#4a4a6e;
  --ac:#6366f1;--ac2:#818cf8;--acg:rgba(99,102,241,.12);
  --gn:#34d399;--rd:#f87171;--yl:#fbbf24;
  --r:12px;--rs:8px;--sh:0 8px 32px rgba(0,0,0,.5);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--t1);min-height:100vh}
a{color:var(--ac2);text-decoration:none}

/* ===== Hero ===== */
.hero{text-align:center;padding:80px 20px 40px;
  background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.06),transparent 60%)}
.hero h1{font-size:clamp(32px,6vw,52px);font-weight:800;
  background:linear-gradient(135deg,#fff 0%,var(--ac2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--t2);margin-top:12px;font-size:15px}

.stats{display:flex;justify-content:center;gap:32px;margin-top:28px;flex-wrap:wrap}
.stat{text-align:center}
.stat .num{font-size:24px;font-weight:700;color:var(--ac2)}
.stat .label{font-size:12px;color:var(--t2);margin-top:2px}

/* ===== Toolbar ===== */
.toolbar{max-width:1100px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.search{flex:1;min-width:200px;position:relative}
.search input{width:100%;padding:12px 16px 12px 42px;background:var(--s1);
  border:1px solid var(--bd);border-radius:24px;color:var(--t1);font-size:14px;outline:none;transition:.2s}
.search input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
.search::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:15px;pointer-events:none}
.nav-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;
  cursor:pointer;transition:.15s;background:transparent;color:var(--t2);border:1px solid transparent}
.pill:hover{color:var(--t1);background:var(--s2)}
.pill.on{background:var(--acg);color:var(--ac2);border-color:rgba(99,102,241,.2)}

.admin-btn{padding:10px 20px;border-radius:20px;background:var(--s2);
  border:1px solid var(--bd);color:var(--t2);font-size:13px;cursor:pointer;transition:.2s}
.admin-btn:hover{border-color:var(--ac);color:var(--ac2)}
.admin-btn.active{background:var(--acg);color:var(--ac2);border-color:var(--ac)}

/* ===== Grid ===== */
.container{max-width:1100px;margin:0 auto;padding:20px}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:16px}

.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  padding:20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.card:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:var(--sh)}
.card .icon{font-size:40px;display:block;margin-bottom:14px}
.card .name{font-size:13px;font-weight:600;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{display:flex;justify-content:space-between;margin-top:10px;
  font-size:11px;color:var(--t3)}
.card .icon{font-size:40px;display:block;margin-bottom:14px}
.card .name{font-size:13px;font-weight:600;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{display:flex;justify-content:space-between;margin-top:10px;
  font-size:11px;color:var(--t3)}

/* ===== Action Sheet ===== */
.action-sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  z-index:1001;opacity:0;pointer-events:none;transition:.2s}
.action-sheet-bg.show{opacity:1;pointer-events:all}
.action-sheet{position:fixed;bottom:0;left:0;right:0;z-index:1002;
  background:var(--s1);border-top:1px solid var(--bd);border-radius:16px 16px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(100%);transition:.3s cubic-bezier(.4,0,.2,1);
  max-width:500px;margin:0 auto}
.action-sheet-bg.show .action-sheet{transform:translateY(0)}
.action-sheet .as-title{font-size:14px;font-weight:600;color:var(--t1);
  text-align:center;margin-bottom:6px;word-break:break-all;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.action-sheet .as-sub{font-size:12px;color:var(--t3);text-align:center;margin-bottom:16px}
.action-sheet .as-btns{display:flex;flex-direction:column;gap:8px}
.action-sheet .as-btn{display:flex;align-items:center;gap:14px;padding:14px 18px;
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);
  color:var(--t1);font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
.action-sheet .as-btn:hover{border-color:var(--ac);background:var(--acg)}
.action-sheet .as-btn:active{transform:scale(.98)}
.action-sheet .as-btn .as-icon{font-size:20px;width:28px;text-align:center}
.action-sheet .as-cancel{margin-top:8px;padding:14px;text-align:center;
  background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);
  color:var(--t2);font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
.action-sheet .as-cancel:hover{color:var(--t1)}

.card.folder .icon{font-size:44px}

/* ===== Empty ===== */
.empty{text-align:center;padding:80px 20px;color:var(--t2)}
.empty .icon{font-size:60px;opacity:.4;margin-bottom:16px}
.empty p{font-size:15px}

/* ===== Breadcrumb ===== */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t2);margin-bottom:4px}
.breadcrumb .bc{cursor:pointer;transition:.15s}
.breadcrumb .bc:hover{color:var(--ac2)}
.breadcrumb .bc.now{color:var(--t1);cursor:default;font-weight:500}
.breadcrumb .sep{opacity:.3}

/* ===== Modal ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:.25s}
.modal-bg.show{opacity:1;pointer-events:all}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:16px;
  padding:32px;max-width:520px;width:92%;box-shadow:var(--sh);transform:scale(.94);transition:.25s}
.modal-bg.show .modal{transform:scale(1)}
.modal h3{font-size:18px;font-weight:700;margin-bottom:20px}
.modal input,.modal textarea{width:100%;padding:12px 16px;background:var(--s2);
  border:1px solid var(--bd);border-radius:var(--rs);color:var(--t1);
  font-size:14px;outline:none;margin-bottom:16px;font-family:inherit;transition:.2s}
.modal input:focus,.modal textarea:focus{border-color:var(--ac)}
.modal .m-acts{display:flex;gap:8px;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 22px;border:none;border-radius:var(--rs);font-size:13px;
  font-weight:600;cursor:pointer;transition:.2s}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{background:var(--ac2)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--bd)}
.btn-g:hover{background:var(--s2);color:var(--t1)}

/* Preview */
.pv{max-height:60vh;overflow:auto;margin:16px 0;border-radius:var(--rs);background:var(--s2);padding:16px}
.pv img{max-width:100%;border-radius:var(--rs)}
.pv pre{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.pv video,.pv audio{width:100%}

/* Upload progress */
.prog{margin-bottom:12px}
.prog-item{display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:8px}
.prog-item .pn{flex:1;font-size:13px}
.prog-item .pb{width:100px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.prog-item .pf{height:100%;background:var(--ac);border-radius:2px;transition:.3s}
.prog-item .ps{font-size:12px;color:var(--t2);min-width:40px;text-align:right}

/* Toast */
.toasts{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;background:var(--s2);border:1px solid var(--bd);
  border-radius:var(--rs);font-size:13px;box-shadow:var(--sh);
  animation:slIn .3s ease;display:flex;align-items:center;gap:10px;max-width:360px}
.toast.ok{border-color:var(--gn)}.toast.err{border-color:var(--rd)}
@keyframes slIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

/* Footer */
footer{text-align:center;padding:40px 20px;color:var(--t3);font-size:12px;border-top:1px solid var(--bd);margin-top:40px}
footer a{color:var(--t2)}

/* Drop overlay */
.drop-overlay{position:fixed;inset:0;background:rgba(99,102,241,.08);
  border:3px dashed var(--ac);z-index:999;display:none;align-items:center;justify-content:center;
  font-size:20px;font-weight:600;color:var(--ac2);pointer-events:none}
.drop-overlay.show{display:flex}

/* ===== Mobile Upload Button ===== */
.mobile-upload{display:none;position:fixed;bottom:24px;right:24px;z-index:100;
  width:56px;height:56px;border-radius:50%;border:none;
  background:var(--ac);color:#fff;font-size:28px;
  box-shadow:0 4px 20px rgba(99,102,241,.4);cursor:pointer;
  transition:.2s;align-items:center;justify-content:center}
.mobile-upload:active{transform:scale(.9)}

/* ===== Back Button (mobile) ===== */
.back-btn{display:none;align-items:center;gap:6px;padding:8px 16px;
  border-radius:20px;background:var(--s2);border:1px solid var(--bd);
  color:var(--t2);font-size:13px;cursor:pointer;transition:.2s;margin-bottom:12px}
.back-btn:hover{border-color:var(--ac);color:var(--ac2)}

/* Responsive */
@media(max-width:640px){
  .hero{padding:50px 16px 24px}
  .hero h1{font-size:28px}
  .hero p{font-size:13px}
  .stats{gap:20px;margin-top:20px}
  .stat .num{font-size:20px}

  .file-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .card{padding:14px}
  .card .icon{font-size:32px;margin-bottom:10px}
  .card .name{font-size:12px}
  .card .meta{font-size:10px}

  .card:hover{transform:none;box-shadow:none}

  .toolbar{flex-direction:column;align-items:stretch;gap:10px}
  .search{min-width:100%}
  .search input{padding:10px 14px 10px 38px;font-size:13px}
  .nav-pills{justify-content:center;gap:4px}
  .pill{padding:7px 12px;font-size:12px}
  .admin-btn{align-self:flex-end;padding:8px 16px;font-size:12px}

  .container{padding:12px 14px}
  .breadcrumb{font-size:12px;gap:4px;flex-wrap:wrap}
  .breadcrumb .bc{padding:2px 0}

  /* 显示返回按钮 */
  .back-btn{display:inline-flex}

  /* 手机上传按钮 - 仅管理员可见 */
  body.is-admin .mobile-upload{display:flex}

  /* Modal 手机适配 */
  .modal{padding:24px 20px;width:95%;max-width:none;border-radius:14px}
  .modal h3{font-size:16px;margin-bottom:16px}
  .modal input,.modal textarea{padding:10px 14px;font-size:13px}
  .btn{padding:10px 18px;font-size:12px}

  /* Preview 手机适配 */
  .pv{max-height:50vh;padding:12px}
  .pv pre{font-size:11px;line-height:1.5}

  /* Upload progress */
  .prog-item{padding:10px 12px;gap:8px}
  .prog-item .pn{font-size:12px}

  /* Toast 手机适配 */
  .toasts{top:12px;right:12px;left:12px}
  .toast{max-width:100%;font-size:12px;padding:12px 16px}

  footer{padding:30px 16px;font-size:11px;margin-top:30px}

  /* Drop overlay 手机隐藏 */
  .drop-overlay{display:none!important}
}
</style>
</head>
<body>

<!-- Drop overlay -->
<div class="drop-overlay" id="drop-overlay">📤 拖拽文件到这里上传</div>

<!-- Hero -->
<div class="hero">
  <h1>🦜 可可鹦鹉的云盘</h1>
  <p>可可鹦鹉的个人文件库 · 公开访问 · 免费托管</p>
  <div class="stats">
    <div class="stat"><div class="num" id="st-count">-</div><div class="label">文件数</div></div>
    <div class="stat"><div class="num" id="st-size">-</div><div class="label">总大小</div></div>
    <div class="stat"><div class="num" id="st-folders">-</div><div class="label">文件夹</div></div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search"><input type="text" id="search" placeholder="搜索文件..." oninput="render()"></div>
  <div class="nav-pills" id="pills"></div>
  <button class="admin-btn" id="admin-toggle" onclick="toggleAdmin()">🔒 管理</button>
</div>

<!-- Content -->
<div class="container">
  <button class="back-btn" id="back-btn" onclick="goBack()">← 返回上级</button>
  <div class="breadcrumb" id="bc"></div>
  <div class="prog" id="prog"></div>
  <div class="file-grid" id="grid"></div>
</div>

<!-- Footer -->
<footer>
  Powered by <a href="https://github.com" target="_blank">GitHub Pages</a> · 文件存储在 GitHub 仓库中
</footer>

<!-- Modal -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<!-- Toast -->
<div class="toasts" id="toasts"></div>

<!-- Hidden file input -->
<input type="file" id="fi" multiple style="display:none" onchange="handleUpload(this.files)">

<!-- Mobile floating upload button -->
<button class="mobile-upload" id="mobile-upload" onclick="document.getElementById('fi').click()" title="上传文件">+</button>

<script>
// ==================== Config ====================
// 改成你自己的仓库信息
const CONFIG = {
  owner: 'kkyw666',        // GitHub 用户名
  repo:  'my-drive',        // 仓库名
  branch:'main',
  folder: 'files',          // 文件存放目录
  // 管理密码（仅用于管理操作，不会外传）
  // 建议部署后改成自己的密码
  adminPassword: 'changeme'
};

const API = 'https://api.github.com';
const FULL_PATH = CONFIG.folder;

// ==================== State ====================
let FILES = [];          // 当前目录文件列表
let ALL_FLAT = [];       // 所有文件（递归，用于统计）
let CUR_PATH = '';       // 当前子目录
let FILTER = 'all';      // 当前分类
let IS_ADMIN = false;
let TOKEN = '';           // admin token (内存中)

// ==================== Init ====================
window.onload = () => {
  loadAll().then(() => loadDir());
  setupDrop();
  renderPills();
};

// ==================== Data Loading ====================
async function loadAll() {
  // 递归获取所有文件用于统计
  ALL_FLAT = [];
  await walkTree(FULL_PATH);
  updateStats();
}

async function walkTree(path) {
  try {
    const h = TOKEN ? { 'Authorization': `token ${TOKEN}` } : {};
    const r = await fetch(`${API}/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}?ref=${CONFIG.branch}`, { headers: h });
    if (!r.ok) return;
    const data = await r.json();
    if (!Array.isArray(data)) return;
    for (const f of data) {
      if (f.name === '.gitkeep') continue;
      if (f.type === 'dir') {
        ALL_FLAT.push({ ...f, _path: f.path });
        await walkTree(f.path);
      } else {
        ALL_FLAT.push({ ...f, _path: f.path });
      }
    }
  } catch (e) {}
}

async function loadDir() {
  const path = FULL_PATH + (CUR_PATH ? '/' + CUR_PATH : '');
  const h = TOKEN ? { 'Authorization': `token ${TOKEN}` } : {};
  try {
    const r = await fetch(`${API}/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${path}?ref=${CONFIG.branch}`, { headers: h });
    if (r.status === 404) { FILES = []; render(); updateBC(); return; }
    if (!r.ok) throw new Error('加载失败');
    const data = await r.json();
    FILES = (Array.isArray(data) ? data : []).filter(f => f.name !== '.gitkeep');
    FILES.sort((a, b) => {
      if (a.type === 'dir' && b.type !== 'dir') return -1;
      if (a.type !== 'dir' && b.type === 'dir') return 1;
      return a.name.localeCompare(b.name);
    });
    render(); updateBC();
  } catch (e) { toast(e.message, 'err'); }
}

// ==================== Stats ====================
function updateStats() {
  const files = ALL_FLAT.filter(f => f.type !== 'dir');
  const dirs = ALL_FLAT.filter(f => f.type === 'dir');
  const totalSize = files.reduce((s, f) => s + (f.size || 0), 0);
  document.getElementById('st-count').textContent = files.length;
  document.getElementById('st-size').textContent = fmtSize(totalSize);
  document.getElementById('st-folders').textContent = dirs.length;
}

// ==================== Render ====================
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = [...FILES];

  if (FILTER !== 'all') {
    list = list.filter(f => {
      if (f.type === 'dir') return true;
      const ext = f.name.split('.').pop().toLowerCase();
      if (FILTER === 'images') return ['jpg','jpeg','png','gif','webp','svg','bmp','ico','avif','tiff'].includes(ext);
      if (FILTER === 'docs') return ['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','md','csv','json','xml','html','css','js','ts'].includes(ext);
      if (FILTER === 'media') return ['mp4','webm','mp3','wav','ogg','flac','avi','mkv','mov','m4a'].includes(ext);
      if (FILTER === 'archives') return ['zip','rar','7z','tar','gz','bz2','xz'].includes(ext);
      return true;
    });
  }

  if (q) list = list.filter(f => f.name.toLowerCase().includes(q));

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty"><div class="icon">📭</div><p>空空如也</p></div>';
    return;
  }

  grid.innerHTML = list.map(f => {
    const isDir = f.type === 'dir';
    const icon = isDir ? '📁' : getIcon(f.name);
    const click = isDir
      ? `enterDir('${esc(CUR_PATH ? CUR_PATH + '/' + f.name : f.name)}')`
      : `showFileActions('${esc(f.name)}','${f.sha||''}',${isDir})`;
    return `<div class="card${isDir?' folder':''}" onclick="${click}" title="${f.name}">
      <span class="icon">${icon}</span>
      <div class="name">${f.name}</div>
      <div class="meta"><span>${isDir?'文件夹':fmtSize(f.size)}</span><span>${ext(f.name).toUpperCase()}</span></div>
    </div>`;
  }).join('');
}

function renderPills() {
  const cats = [
    { key:'all', label:'📁 全部' },
    { key:'images', label:'🖼️ 图片' },
    { key:'docs', label:'📄 文档' },
    { key:'media', label:'🎬 媒体' },
    { key:'archives', label:'📦 压缩包' },
  ];
  document.getElementById('pills').innerHTML = cats.map(c =>
    `<div class="pill${FILTER===c.key?' on':''}" onclick="setFilter('${c.key}')">${c.label}</div>`
  ).join('');
}

function setFilter(f) {
  FILTER = f;
  renderPills(); render();
}

// ==================== Navigation ====================
function enterDir(name) {
  CUR_PATH = CUR_PATH ? CUR_PATH + '/' + name : name;
  loadDir();
}

function goBack() {
  if (!CUR_PATH) return;
  const parts = CUR_PATH.split('/');
  parts.pop();
  CUR_PATH = parts.join('/');
  loadDir();
}

function goTo(path) {
  CUR_PATH = path;
  loadDir();
}

function updateBC() {
  const bc = document.getElementById('bc');
  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.style.display = CUR_PATH ? '' : 'none';

  let html = `<span class="bc${!CUR_PATH?' now':''}" onclick="goTo('')">☁️ 根目录</span>`;
  if (CUR_PATH) {
    const parts = CUR_PATH.split('/');
    let path = '';
    parts.forEach((p, i) => {
      path += (path ? '/' : '') + p;
      html += `<span class="sep">/</span><span class="bc${i===parts.length-1?' now':''}" onclick="goTo('${esc(path)}')">${p}</span>`;
    });
  }
  bc.innerHTML = html;
}

// ==================== Admin ====================
function toggleAdmin() {
  if (IS_ADMIN) {
    IS_ADMIN = false; TOKEN = '';
    document.getElementById('admin-toggle').classList.remove('active');
    document.getElementById('admin-toggle').textContent = '🔒 管理';
    document.body.classList.remove('is-admin');
    render();
    toast('已退出管理模式', 'ok');
    return;
  }
  showModal(`
    <h3>🔑 管理员登录</h3>
    <input type="password" id="admin-pw" placeholder="输入管理密码">
    <input type="password" id="admin-token" placeholder="GitHub Token (repo 权限)">
    <div style="font-size:12px;color:var(--t2);margin-bottom:16px">
      Token 需要 <strong>repo</strong> 权限，用于上传/删除文件。
      <a href="https://github.com/settings/tokens" target="_blank">创建 Token →</a>
    </div>
    <div class="m-acts">
      <button class="btn btn-g" onclick="closeModal()">取消</button>
      <button class="btn btn-p" onclick="doAdminLogin()">登录</button>
    </div>
  `);
  setTimeout(() => document.getElementById('admin-pw').focus(), 100);
}

function doAdminLogin() {
  const pw = document.getElementById('admin-pw').value;
  const tk = document.getElementById('admin-token').value.trim();
  if (pw !== CONFIG.adminPassword) { toast('密码错误', 'err'); return; }
  if (!tk) { toast('请输入 Token', 'err'); return; }
  TOKEN = tk;
  IS_ADMIN = true;
  document.getElementById('admin-toggle').classList.add('active');
  document.getElementById('admin-toggle').textContent = '🔓 管理中';
  document.body.classList.add('is-admin');
  closeModal(); render();
  toast('管理模式已开启', 'ok');
}

// ==================== Upload ====================
function handleUpload(fileList) {
  for (const file of fileList) uploadOne(file);
}

async function uploadOne(file) {
  if (file.size > 100 * 1024 * 1024) { toast(`${file.name} 超过100MB`, 'err'); return; }
  const relPath = CUR_PATH ? CUR_PATH + '/' + file.name : file.name;
  const fullPath = FULL_PATH + '/' + relPath;
  const id = 'p' + Date.now() + Math.random();
  const progEl = document.getElementById('prog');
  progEl.innerHTML += `<div class="prog-item" id="${id}">
    <span class="pn">${file.name}</span>
    <div class="pb"><div class="pf" id="${id}f" style="width:0%"></div></div>
    <span class="ps" id="${id}s">⏳</span>
  </div>`;

  try {
    const content = await toBase64(file);
    let sha;
    // 检查文件是否已存在
    try {
      const r = await fetch(`${API}/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${fullPath}`, {
        headers: { 'Authorization': `token ${TOKEN}` }
      });
      if (r.ok) { sha = (await r.json()).sha; }
    } catch (e) {}

    document.getElementById(`${id}f`).style.width = '60%';
    document.getElementById(`${id}s`).textContent = '⬆️';

    const body = { message: `Upload: ${file.name}`, content, branch: CONFIG.branch };
    if (sha) body.sha = sha;

    const r2 = await fetch(`${API}/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${fullPath}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r2.ok) {
      const e = await r2.json();
      throw new Error(e.message || JSON.stringify(e.errors || '上传失败'));
    }

    document.getElementById(`${id}f`).style.width = '100%';
    document.getElementById(`${id}s`).textContent = '✅';
    toast(`${file.name} 上传成功`, 'ok');
    setTimeout(() => { const el = document.getElementById(id); if (el) el.remove(); }, 3000);
    loadAll().then(() => loadDir());
  } catch (e) {
    document.getElementById(`${id}s`).textContent = '❌';
    toast(`${file.name}: ${e.message}`, 'err');
    console.error('Upload error:', e);
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => {
      // data:xxx;base64,xxxxx → 取逗号后面的部分
      const b64 = r.result.split(',')[1];
      res(b64);
    };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ==================== File Ops ====================
function dlFile(name) {
  const relPath = CUR_PATH ? CUR_PATH + '/' + name : name;
  const rawUrl = `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${FULL_PATH}/${relPath}`;
  toast('正在下载...', 'ok');
  fetch(rawUrl).then(r => r.blob()).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  }).catch(() => window.open(rawUrl, '_blank'));
}

// ==================== Action Sheet ====================
function showFileActions(name, sha, isDir) {
  if (isDir) { enterDir(CUR_PATH ? CUR_PATH + '/' + name : name); return; }
  const bg = document.createElement('div');
  bg.className = 'action-sheet-bg';
  const adminBtns = IS_ADMIN ? `
    <div class="as-btn" onclick="this.closest('.action-sheet-bg').remove();renameFile('${esc(name)}','${sha}')">
      <span class="as-icon">✏️</span><span>重命名</span></div>
    <div class="as-btn" onclick="this.closest('.action-sheet-bg').remove();delFile('${esc(name)}','${sha}')">
      <span class="as-icon">🗑️</span><span style="color:var(--rd)">删除</span></div>` : '';
  bg.innerHTML = `<div class="action-sheet">
    <div class="as-title">${name}</div>
    <div class="as-sub">${ext(name).toUpperCase()} 文件</div>
    <div class="as-btns">
      <div class="as-btn" onclick="this.closest('.action-sheet-bg').remove();dlFile('${esc(name)}')">
        <span class="as-icon">📥</span><span>下载到本地</span></div>
      <div class="as-btn" onclick="this.closest('.action-sheet-bg').remove();preview('${esc(name)}')">
        <span class="as-icon">👁️</span><span>在线预览</span></div>
      ${adminBtns}
    </div>
    <div class="as-cancel" onclick="this.closest('.action-sheet-bg').remove()">取消</div>
  </div>`;
  bg.addEventListener('click', e => { if (e.target === bg) bg.remove(); });
  document.body.appendChild(bg);
  requestAnimationFrame(() => bg.classList.add('show'));
}

async function renameFile(name, sha) {
  const newName = prompt('新文件名:', name);
  if (!newName || newName === name) return;
  if (!IS_ADMIN) return;
  try {
    const fullPath = FULL_PATH + (CUR_PATH ? '/' + CUR_PATH : '') + '/' + name;
    const r = await fetch(`${API}/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${fullPath}`, {
      headers: { 'Authorization': `token ${TOKEN}` }
    });
    const d = await r.json();
    const newPath = FULL_PATH + (CUR_PATH ? '/' + CUR_PATH : '') + '/' + newName;
    await fetch(`${API}/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${newPath}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Rename: ${name} → ${newName}`, content: d.content, branch: CONFIG.branch })
    });
    await fetch(`${API}/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${fullPath}`, {
      method: 'DELETE',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Rename: ${name} → ${newName}`, sha: d.sha, branch: CONFIG.branch })
    });
    toast('重命名成功', 'ok');
    loadAll().then(() => loadDir());
  } catch (e) { toast(e.message, 'err'); }
}

async function delFile(name, sha) {
  if (!confirm(`确定删除 "${name}"？`)) return;
  if (!IS_ADMIN) return;
  try {
    const fullPath = FULL_PATH + (CUR_PATH ? '/' + CUR_PATH : '') + '/' + name;
    await fetch(`${API}/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${fullPath}`, {
      method: 'DELETE',
      headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `Delete: ${name}`, sha, branch: CONFIG.branch })
    });
    toast(`${name} 已删除`, 'ok');
    loadAll().then(() => loadDir());
  } catch (e) { toast(e.message, 'err'); }
}

// ==================== Preview ====================
async function preview(name) {
  const ext = name.split('.').pop().toLowerCase();
  const imgExts = ['jpg','jpeg','png','gif','webp','svg','bmp','avif'];
  const vidExts = ['mp4','webm','mov'];
  const audExts = ['mp3','wav','ogg','flac','m4a'];
  const txtExts = ['txt','md','json','xml','html','css','js','ts','py','go','rs','java','rb','php','sh','yml','yaml','toml','csv','env','gitignore','jsx','tsx','vue','svelte','sql','c','cpp','h','hpp'];

  const relPath = CUR_PATH ? CUR_PATH + '/' + name : name;
  const rawUrl = `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${FULL_PATH}/${relPath}`;

  if (imgExts.includes(ext)) {
    showModal(`<h3>${name}</h3><div class="pv"><img src="${rawUrl}" alt="${name}"></div>
      <div class="m-acts"><button class="btn btn-p" onclick="dlFile('${esc(name)}')">⬇ 下载</button><a class="btn btn-g" href="${rawUrl}" target="_blank">新窗口</a>
      <button class="btn btn-g" onclick="closeModal()">关闭</button></div>`);
  } else if (vidExts.includes(ext)) {
    showModal(`<h3>${name}</h3><div class="pv"><video src="${rawUrl}" controls></video></div>
      <div class="m-acts"><button class="btn btn-p" onclick="dlFile('${esc(name)}')">⬇ 下载</button>
      <button class="btn btn-g" onclick="closeModal()">关闭</button></div>`);
  } else if (audExts.includes(ext)) {
    showModal(`<h3>${name}</h3><div class="pv"><audio src="${rawUrl}" controls style="width:100%"></audio></div>
      <div class="m-acts"><button class="btn btn-p" onclick="dlFile('${esc(name)}')">⬇ 下载</button>
      <button class="btn btn-g" onclick="closeModal()">关闭</button></div>`);
  } else if (txtExts.includes(ext)) {
    try {
      const r = await fetch(rawUrl);
      const text = await r.text();
      showModal(`<h3>${name}</h3><div class="pv"><pre>${escHtml(text)}</pre></div>
        <div class="m-acts"><button class="btn btn-p" onclick="dlFile('${esc(name)}')">⬇ 下载</button>
        <button class="btn btn-g" onclick="closeModal()">关闭</button></div>`);
    } catch (e) { toast('预览失败', 'err'); }
  } else if (ext === 'pdf') {
    showModal(`<h3>${name}</h3><div class="pv"><iframe src="${rawUrl}" style="width:100%;height:50vh;border:none"></iframe></div>
      <div class="m-acts"><button class="btn btn-p" onclick="dlFile('${esc(name)}')">⬇ 下载</button><a class="btn btn-g" href="${rawUrl}" target="_blank">新窗口</a>
      <button class="btn btn-g" onclick="closeModal()">关闭</button></div>`);
  } else {
    showModal(`<h3>${name}</h3><p style="color:var(--t2);margin:20px 0">无法预览此文件</p>
      <div class="m-acts"><button class="btn btn-p" onclick="dlFile('${esc(name)}')">⬇ 下载</button>
      <button class="btn btn-g" onclick="closeModal()">关闭</button></div>`);
  }
}

// ==================== Drop ====================
function setupDrop() {
  const overlay = document.getElementById('drop-overlay');
  let dragCount = 0;
  document.addEventListener('dragenter', e => { e.preventDefault(); dragCount++; if (IS_ADMIN) overlay.classList.add('show'); });
  document.addEventListener('dragleave', e => { e.preventDefault(); dragCount--; if (dragCount <= 0) { dragCount = 0; overlay.classList.remove('show'); } });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); dragCount = 0; overlay.classList.remove('show');
    if (IS_ADMIN && e.dataTransfer.files.length) handleUpload(e.dataTransfer.files);
  });
}

// ==================== Helpers ====================
function getIcon(name) {
  const e = ext(name);
  const m = {jpg:'🖼',jpeg:'🖼',png:'🖼',gif:'🖼',webp:'🖼',svg:'🖼',avif:'🖼',tiff:'🖼',
    mp4:'🎬',webm:'🎬',avi:'🎬',mkv:'🎬',mov:'🎬',
    mp3:'🎵',wav:'🎵',ogg:'🎵',flac:'🎵',m4a:'🎵',
    pdf:'📕',doc:'📘',docx:'📘',xls:'📗',xlsx:'📗',ppt:'📙',pptx:'📙',
    txt:'📝',md:'📝',csv:'📊',json:'📋',xml:'📋',html:'🌐',css:'🎨',js:'⚡',ts:'⚡',
    zip:'📦',rar:'📦','7z':'📦',tar:'📦',gz:'📦',
    py:'🐍',go:'🔵',rs:'🦀',java:'☕',rb:'💎',php:'🐘',c:'🔷',cpp:'🔷',sql:'🗄️',
    sh:'🖥️',exe:'⚙️',dmg:'💿',iso:'💿',yml:'⚙️',yaml:'⚙️',toml:'⚙️',env:'⚙️',gitignore:'⚙️',
  };
  return m[e] || '📄';
}

function ext(n) { return n.includes('.') ? n.split('.').pop().toLowerCase() : ''; }

function fmtSize(b) {
  if (!b) return '0 B';
  const u = ['B','KB','MB','GB'];
  let i = 0;
  while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
  return b.toFixed(i ? 1 : 0) + ' ' + u[i];
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function toast(msg, type = 'ok') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type === 'ok' ? '✅' : '❌'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
</script>
